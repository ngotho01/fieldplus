version: '3.9'

services:

  db:
    image: postgres:15
    container_name: fieldpulse_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fieldpulse
      POSTGRES_USER: fieldpulse_user
      POSTGRES_PASSWORD: fieldpulse_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: fieldpulse_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fieldpulse_backend
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - DATABASE_URL=postgres://fieldpulse_user:fieldpulse_pass@db:5432/fieldpulse
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minio_admin
      - MINIO_SECRET_KEY=minio_password
      - SECRET_KEY=super-secret-key-change-in-production
      - DEBUG=True
    depends_on:
      - db
      - minio

volumes:
  postgres_data:
  minio_data: